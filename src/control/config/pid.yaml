controller_node:
  ros__parameters:

    # -----------------------------------------------------------------------
    # PID Gains — Position Control (error in meters, output in m/s)
    # -----------------------------------------------------------------------
    pid_x:
      kp: 1.0
      ki: 0.0
      kd: 0.2

    pid_y:
      kp: 1.0
      ki: 0.0
      kd: 0.2

    pid_z:
      kp: 1.5
      ki: 0.05
      kd: 0.3

    # -----------------------------------------------------------------------
    # PID Gains — Yaw Control (error in radians, output in rad/s)
    # -----------------------------------------------------------------------
    pid_yaw:
      kp: 1.0
      ki: 0.0
      kd: 0.1

    # -----------------------------------------------------------------------
    # Output Limits (m/s)
    # -----------------------------------------------------------------------
    max_vel_xy: 0.5       # max horizontal velocity command
    max_vel_z:  0.3       # max vertical velocity command
    max_yaw_rate: 0.5     # max yaw rate command

    # -----------------------------------------------------------------------
    # Control loop rate (Hz)
    # -----------------------------------------------------------------------
    control_rate: 50.0